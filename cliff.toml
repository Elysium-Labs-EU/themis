[changelog]
header = """
# Changelog

All notable changes to themis are documented here.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}**breaking** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://codeberg.org/Elysium_Labs/themis/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^perf", group = "Performance" },
  { message = "^test", group = "Testing" },
  { message = "^chore", group = "Maintenance" },
  { message = "^ci", group = "CI/CD" },
  # Catch non-conventional commit style used in older commits
  { message = "^[Ff]ix", group = "Bug Fixes" },
  { message = "^[Aa]dd", group = "Features" },
  { message = "^[Ii]mprove", group = "Improvements" },
  { message = "^[Rr]efactor", group = "Refactoring" },
  { message = "^[Uu]pdate", group = "Improvements" },
  { message = ".*", group = "Miscellaneous" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
