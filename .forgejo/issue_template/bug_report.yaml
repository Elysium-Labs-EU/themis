name: Bug Report
about: Report something that is broken or behaving unexpectedly
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `themis ...`
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: themis version
      placeholder: "e.g. v0.3.1 — run: themis version"
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        OS: Debian 12
        Arch: amd64
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
    validations:
      required: false
