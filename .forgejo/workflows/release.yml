name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  lint:
    runs-on: codeberg-small
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  test:
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test ./... -v -race

  build:
    needs: [lint, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: themis-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: themis-linux-arm64
    runs-on: codeberg-medium

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build \
            -ldflags="-s -w \
              -X 'codeberg.org/Elysium_Labs/themis/internal/buildinfo.Version=${{ steps.version.outputs.version }}' \
              -X 'codeberg.org/Elysium_Labs/themis/internal/buildinfo.GitCommit=${{ github.sha }}' \
              -X 'codeberg.org/Elysium_Labs/themis/internal/buildinfo.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
            -o ${{ matrix.artifact }} .

      - name: Verify binary
        run: |
          ls -lh ${{ matrix.artifact }}
          file ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: codeberg-small
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "themis-linux-*" -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum themis-linux-* > sha256sums.txt
          cat sha256sums.txt

      - name: Determine if prerelease
        id: prerelease
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Install git-cliff
        run: |
          case "$(uname -m)" in
            x86_64) ARCH=x86_64-unknown-linux-gnu ;;
            aarch64|arm64) ARCH=aarch64-unknown-linux-gnu ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -sL "https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-${ARCH}.tar.gz" | tar xz
          sudo mv "git-cliff-2.13.1/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Generate changelog section
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            # Pre-release: just diff against the immediately preceding tag.
            git-cliff --latest --strip header -o changelog-section.md
          else
            # Stable release: diff against the previous stable tag (skip rc/pre tags)
            # so the notes cover everything since the last real release.
            PREV_STABLE=$(git tag --list 'v*' | grep -Ev -- '-' | sort -V | awk -v v="$VERSION" '$0==v{found=1; next} !found{prev=$0} END{print prev}')
            if [ -n "$PREV_STABLE" ]; then
              git-cliff "${PREV_STABLE}..${VERSION}" --strip header -o changelog-section.md
            else
              git-cliff --tag "$VERSION" --strip header -o changelog-section.md
            fi
          fi
          echo "--- generated changelog section ---"
          cat changelog-section.md

      - name: Build release body
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ needs.build.outputs.version }}"

          cat > footer.md <<'EOF'
          ### Quick Installation

          Using curl
          ```bash
          curl -sSL https://codeberg.org/REPO_PLACEHOLDER/raw/branch/main/install.sh -o install.sh
          sudo bash install.sh
          ```

          Using wget
          ```bash
          wget https://codeberg.org/REPO_PLACEHOLDER/raw/branch/main/install.sh
          sudo bash install.sh
          ```

          ### Manual Installation

          Download the appropriate binary for your architecture:
          - **Linux AMD64**: `themis-linux-amd64`
          - **Linux ARM64**: `themis-linux-arm64`

          Then:
          ```bash
          chmod +x themis-linux-amd64  # or themis-linux-arm64
          sudo cp themis-linux-amd64 /usr/local/bin/themis
          ```

          ### Verify Download

          Check the `sha256sums.txt` file and verify:
          ```bash
          sha256sum -c sha256sums.txt
          ```

          See the [README](https://codeberg.org/REPO_PLACEHOLDER/src/branch/main/README.md) for full documentation.
          EOF
          sed -i "s|REPO_PLACEHOLDER|${REPO}|g" footer.md

          {
            echo "## themis ${VERSION}"
            echo ""
            echo "Automated Debian hardening CLI - check/plan/apply/rollback for VPS hardening."
            echo ""
            echo "### What's Changed"
            echo ""
            cat changelog-section.md
            echo ""
            cat footer.md
          } > release-body.md

      - name: Create release and upload assets
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          IS_PRERELEASE="${{ steps.prerelease.outputs.is_prerelease }}"
          REPO="${{ github.repository }}"

          # Create the release
          RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://codeberg.org/api/v1/repos/${REPO}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "${VERSION}" \
              --arg name "${VERSION}" \
              --rawfile body release-body.md \
              --argjson prerelease "${IS_PRERELEASE}" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: $prerelease}'
            )")
          RELEASE_HTTP_CODE=$(echo "${RELEASE_RESPONSE}" | tail -n1)
          RELEASE_BODY=$(echo "${RELEASE_RESPONSE}" | sed '$d')
          RELEASE_ID=$(echo "${RELEASE_BODY}" | jq -r '.id')

          if [ "${RELEASE_HTTP_CODE}" != "201" ] || [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            echo "Failed to create release. HTTP: ${RELEASE_HTTP_CODE}, Response: ${RELEASE_BODY}"
            exit 1
          fi

          echo "Created release ID: ${RELEASE_ID}"

          # Upload each asset
          for file in release/themis-linux-amd64 release/themis-linux-arm64 release/sha256sums.txt; do
            filename=$(basename "$file")
            echo "Uploading ${filename}..."
            UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://codeberg.org/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${filename}" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${file}")
            UPLOAD_HTTP_CODE=$(echo "${UPLOAD_RESPONSE}" | tail -n1)
            if [ "${UPLOAD_HTTP_CODE}" != "201" ]; then
              echo "Failed to upload ${filename}. HTTP: ${UPLOAD_HTTP_CODE}"
              exit 1
            fi
            echo "Uploaded ${filename} (HTTP ${UPLOAD_HTTP_CODE})"
          done
