name: OSV Scan

# Vulnerability status only changes when dependencies change or when new CVEs are
# published upstream — not on every code push. So: scan PRs that touch the
# dependency files, once weekly to catch newly-published CVEs against unchanged
# deps, and on demand. (No `push:` — the PR run already covered any dep change.)
on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  osv-scan:
    name: OSV Scanner
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Prebuilt, pinned binary instead of `go install ...@latest`, which compiled
      # the scanner from source on every run (the real slowness).
      - name: Install osv-scanner (prebuilt, pinned)
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --version

      - name: Run OSV Scanner
        run: ./osv-scanner scan --lockfile=go.mod --recursive .
