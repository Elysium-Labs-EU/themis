name: OSV Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  osv-scan:
    name: OSV Scanner
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install osv-scanner
        env:
          GOTOOLCHAIN: auto
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest

      - name: Run OSV Scanner
        run: osv-scanner scan --lockfile=go.mod --recursive .
