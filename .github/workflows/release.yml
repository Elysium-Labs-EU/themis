name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test ./... -v -race

  build:
    needs: [lint, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: themis-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: themis-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build \
            -ldflags="-s -w \
              -X 'github.com/Elysium-Labs-EU/themis/internal/buildinfo.Version=${{ steps.version.outputs.version }}' \
              -X 'github.com/Elysium-Labs-EU/themis/internal/buildinfo.GitCommit=${{ github.sha }}' \
              -X 'github.com/Elysium-Labs-EU/themis/internal/buildinfo.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
            -o ${{ matrix.artifact }} .

      - name: Verify binary
        run: |
          ls -lh ${{ matrix.artifact }}
          file ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "themis-linux-*" -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum themis-linux-* > sha256sums.txt
          cat sha256sums.txt

      - name: Sign checksums
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          cd release
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            echo "RELEASE_SIGNING_KEY secret is not set — skipping release signing."
            echo "Clients only warn on a missing signature right now (see requireReleaseSignature"
            echo "in cmd/update.go), but that's meant to flip to a hard failure once this secret"
            echo "is provisioned and a signed release has shipped. Provision it before then."
            exit 0
          fi
          key_file=$(mktemp)
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$RELEASE_SIGNING_KEY" > "$key_file"
          openssl dgst -sha256 -sign "$key_file" -out sha256sums.txt.sig sha256sums.txt
          echo "Signed sha256sums.txt -> sha256sums.txt.sig"

      - name: Determine if prerelease
        id: prerelease
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Install git-cliff
        run: |
          case "$(uname -m)" in
            x86_64) ARCH=x86_64-unknown-linux-gnu ;;
            aarch64|arm64) ARCH=aarch64-unknown-linux-gnu ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -sL "https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-${ARCH}.tar.gz" | tar xz
          sudo mv "git-cliff-2.13.1/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Generate changelog section
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            # Pre-release: just diff against the immediately preceding tag.
            git-cliff --latest --strip header -o changelog-section.md
          else
            # Stable release: diff against the previous stable tag (skip rc/pre tags)
            # so the notes cover everything since the last real release.
            PREV_STABLE=$(git tag --list 'v*' | grep -Ev -- '-' | sort -V | awk -v v="$VERSION" '$0==v{found=1; next} !found{prev=$0} END{print prev}')
            if [ -n "$PREV_STABLE" ]; then
              git-cliff "${PREV_STABLE}..${VERSION}" --strip header -o changelog-section.md
            else
              git-cliff --tag "$VERSION" --strip header -o changelog-section.md
            fi
          fi
          echo "--- generated changelog section ---"
          cat changelog-section.md

      - name: Build release body
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ needs.build.outputs.version }}"

          cat > footer.md <<'EOF'
          ### Quick Installation

          Using curl
          ```bash
          curl -sSL https://raw.githubusercontent.com/REPO_PLACEHOLDER/main/install.sh -o install.sh
          sudo bash install.sh
          ```

          Using wget
          ```bash
          wget https://raw.githubusercontent.com/REPO_PLACEHOLDER/main/install.sh
          sudo bash install.sh
          ```

          ### Manual Installation

          Download the appropriate binary for your architecture:
          - **Linux AMD64**: `themis-linux-amd64`
          - **Linux ARM64**: `themis-linux-arm64`

          Then:
          ```bash
          chmod +x themis-linux-amd64  # or themis-linux-arm64
          sudo cp themis-linux-amd64 /usr/local/bin/themis
          ```

          ### Verify Download

          Check the `sha256sums.txt` file and verify:
          ```bash
          sha256sum -c sha256sums.txt
          ```

          If this release includes `sha256sums.txt.sig`, verify it against the
          release signing key embedded in `install.sh`/`cmd/update.go`:
          ```bash
          openssl dgst -sha256 -verify release-signing-pubkey.pem -signature sha256sums.txt.sig sha256sums.txt
          ```

          See the [README](https://github.com/REPO_PLACEHOLDER/blob/main/README.md) for full documentation.
          EOF
          sed -i "s|REPO_PLACEHOLDER|${REPO}|g" footer.md

          {
            echo "## themis ${VERSION}"
            echo ""
            echo "Automated Debian hardening CLI - check/plan/apply/rollback for VPS hardening."
            echo ""
            echo "### What's Changed"
            echo ""
            cat changelog-section.md
            echo ""
            cat footer.md
          } > release-body.md

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          body_path: release-body.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            release/themis-linux-amd64
            release/themis-linux-arm64
            release/sha256sums.txt
            release/sha256sums.txt.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
