name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

  integration-test:
    name: Integration Test (root)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      # lynis powers the B3 audit test; if the runner can't reach the apt
      # mirror the install is best-effort and the test self-skips (t.Skip on
      # missing lynis) rather than failing the job.
      - name: Install lynis (best-effort)
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y lynis

      # THEMIS_INTEGRATION_MUTATE is intentionally UNSET, so the host-mutating
      # B1 fix apply/revert tests self-skip (they install packages + enable
      # services, which CI can't support). They run for real on OrbStack via
      # `make test-integration-orb`. The B2 hermetic self-update test is fully
      # self-contained and runs here; B3 lynis runs or skips depending on the
      # install step above.
      - name: Run integration tests
        run: go test ./... -tags integration -v -count=1

  crap:
    name: CRAP Score
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-crap
        run: go install github.com/padiazg/go-crap@latest

      - name: Run change-scoped CRAP gate
        run: make crap
        env:
          GO_CRAP_BASE: origin/${{ github.base_ref }}

  verify-build:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify code compiles
        run: go build -v ./...
